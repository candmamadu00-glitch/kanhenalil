<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENHEN ALIL MULTISERVIÇOS - Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f9fafb;
        }

        .bg-food-pattern {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(234, 88, 12, 0.7);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body class="min-h-screen bg-food-pattern flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-md p-8 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-orange-100 rounded-bl-full -z-10 opacity-50"></div>

        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-orange-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-orange-500/30">
                <i class="fas fa-utensils text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">KANHEN ALIL (MON SABI)</h1>
            <p class="text-orange-600 font-semibold tracking-widest text-sm mt-1"> MULTI SERVIÇOS</p>
            <p class="text-gray-500 text-sm mt-2">A melhor comida da Guiné-Bissau à sua porta.</p>
        </div>

        <form onsubmit="event.preventDefault(); alert('Em breve ligaremos isto ao banco de dados!');" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Telefone ou E-mail</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-gray-400"></i>
                    </div>
                    <input type="text" class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all" placeholder="Seu contacto">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Palavra-passe</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all" placeholder="••••••••">
                </div>
                <div class="flex justify-end mt-2">
                    <a href="#" class="text-xs text-orange-600 font-medium hover:text-orange-800">Esqueceu a senha?</a>
                </div>
            </div>

            <button type="submit" class="btn-primary w-full text-white font-bold py-4 rounded-xl text-lg flex justify-center items-center gap-2 mt-4">
                Entrar e Pedir <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-gray-100 pt-6">
            <p class="text-gray-600 text-sm">Ainda não tem conta?</p>
            <button class="mt-2 w-full bg-white border-2 border-orange-500 text-orange-600 font-bold py-3 rounded-xl hover:bg-orange-50 transition-colors">
                Criar Conta Cliente
            </button>
        </div>
    </div>

</body>
</html>
